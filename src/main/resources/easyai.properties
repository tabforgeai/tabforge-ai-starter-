# EasyAI Configuration
# Copy this file to src/main/resources/ in your application and fill in your values.
#
# Supported providers: openai, ollama
#
# OpenAI example:
#   easyai.provider=openai
#   easyai.api-key=sk-YOUR-KEY
#   easyai.model-name=gpt-4o-mini
#
# Groq example (OpenAI-compatible):
#   easyai.provider=openai
#   easyai.api-key=gsk_YOUR-KEY
#   easyai.base-url=https://api.groq.com/openai/v1/
#   easyai.model-name=llama-3.3-70b-versatile
#
# Ollama (local, no API key needed):
#   easyai.provider=ollama
#   easyai.model-name=llama3

easyai.provider=openai
easyai.api-key=
easyai.model-name=gpt-4o-mini
