<!DOCTYPE html>


<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>Login</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #2c3e50, #4ca1af);
            font-family: Arial, sans-serif;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            width: 320px;
        }

        .login-title {
            text-align: center;
            margin-bottom: 25px;
            font-size: 20px;
            font-weight: bold;
            color: #2c3e50;
        }

        .login-field {
            margin-bottom: 15px;
            width: 100%;
        }

        .login-button {
            width: 100%;
            margin-top: 10px;
        }
    </style>

</h:head>

<h:body>

    <h:form>

        <div class="login-card">

            <div class="login-title">
                Application Login
            </div>

            <p:messages showDetail="true" closable="true"/>

            <p:inputText id="username"
                         placeholder="admin@mail.com" value="#{loginBacking.email}"
                         required="true"
                         requiredMessage="Username is required"
                         styleClass="login-field" />
                         
             <p:password id="password" placeholder="ADMIN123" value="#{loginBacking.password}" required="true" requiredMessage="Password is required"
                         styleClass="login-field"/>


            <p:commandButton value="Login"
                             process="@form"   action="#{loginBacking.submit}"
                             update="@form"  ajax="false"
                             styleClass="login-button" />

        </div>

    </h:form>

</h:body>
</html>
